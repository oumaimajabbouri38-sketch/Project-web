<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 1</title>

    <style>

* {
    margin: 0;
    padding: 0;
   box-sizing: border-box;
}

    .bagkround {
    height: 100vh;
    width: 100%;
    background: linear-gradient(rgba(0, 0, 0, 0.5), transparent), 
                url('https://images.pexels.com/photos/13896557/pexels-photo-13896557.jpeg'); 
    background-size: cover;
    background-position: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
    position: relative;
}

.logo {
    position: absolute;
    top: 20px;
    left: 30px;
    
}

.text {
    border: 2px solid #bff10a; 
    padding: 20px 40px;
    margin-bottom: 20px;
    display: inline-block;
}

h2 {
    font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    font-size: 3rem;
    font-style: italic;
    text-transform: uppercase;
    line-height: 1.3;
}

.highlight {
    color: #f1f114; 
}

.btn {
    display: inline-block;
    background-color: #f1f114;
    color: black;
    padding: 15px 40px;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.2rem;
    transition: 0.3s;
}

.btn:hover {
    background-color: white;
    transform: scale(1.05);
}

@media (max-width:768px) {
    h2 {
        font-size: 1.5rem;
    }

    .text {
        padding: 10px 20px;
    }
}
  </style>
</head>
<body>

    <section class="bagkround">
        <div class="logo">
            <img src="FIt_with_you-removebg-preview (1).png"  width="200px">
        </div>
 <br>
        <div class="content">
            <div class="text">
                <h2>
“You don’t need <span class="highlight">motivation</span>. 
You need <span class="highlight">discipline</span>. 
<span class="highlight">Motivation</span> comes and goes, but <span class="highlight">discipline</span> is what gets you out of bed.”</h2></div>
            
            <a href="page2.html" class="btn" target="_blank">START NOW</a>
        </div>
    </section>

</body>
</html>
